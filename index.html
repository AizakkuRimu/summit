<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summit</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath d='M16 5 L28 26 H4 Z' fill='%239C6B3E'/%3E%3Cpath d='M16 5 L22 16 H10 Z' fill='%23F2ECE2'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/mountain.css">
<link rel="stylesheet" href="css/peaks.css">
</head>
<body>

  <header class="summit-header">
    <div class="summit-brand">
      <svg class="summit-mark" viewBox="0 0 32 32" aria-hidden="true">
        <path d="M16 5 L28 26 H4 Z" class="summit-mark__outer"></path>
        <path d="M16 5 L22 16 H10 Z" class="summit-mark__inner"></path>
      </svg>
      <span class="summit-wordmark">Summit</span>
    </div>

    <nav class="summit-tabs" role="tablist" aria-label="Summit workspaces">
      <button class="summit-tab" role="tab" data-tab="mountain" aria-selected="true" aria-controls="panel-mountain" id="tab-mountain">
        <span class="summit-tab__peak" aria-hidden="true"></span>
        Mountain
      </button>
      <button class="summit-tab" role="tab" data-tab="peaks" aria-selected="false" aria-controls="panel-peaks" id="tab-peaks">
        <span class="summit-tab__peak" aria-hidden="true"></span>
        Peaks
      </button>
      <button class="summit-tab" role="tab" data-tab="draft" aria-selected="false" aria-controls="panel-draft" id="tab-draft">
        <span class="summit-tab__peak" aria-hidden="true"></span>
        Draft
      </button>
    </nav>

    <button class="summit-theme-toggle" id="theme-toggle" aria-label="Toggle dark mode" aria-pressed="false">
      <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/></svg>
      <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5Z"/></svg>
    </button>
  </header>

  <main class="summit-main">
    <section class="summit-panel" id="panel-mountain" role="tabpanel" aria-labelledby="tab-mountain">
      <div class="mountain" id="mountain" data-page-size="letter">

        <div class="summit-toolbar mountain-toolbar" role="toolbar" aria-label="Mountain formatting toolbar">

          <div class="summit-toolbar__group" data-group="marks">
            <button type="button" class="summit-btn summit-btn--glyph" data-cmd="bold" aria-label="Bold" aria-pressed="false" title="Bold (Ctrl+B)"><b>B</b></button>
            <button type="button" class="summit-btn summit-btn--glyph summit-btn--italic" data-cmd="italic" aria-label="Italic" aria-pressed="false" title="Italic (Ctrl+I)"><i>I</i></button>
            <button type="button" class="summit-btn summit-btn--glyph summit-btn--underline" data-cmd="underline" aria-label="Underline" aria-pressed="false" title="Underline (Ctrl+U)"><u>U</u></button>
            <button type="button" class="summit-btn summit-btn--glyph summit-btn--strike" data-cmd="strikeThrough" aria-label="Strikethrough" aria-pressed="false" title="Strikethrough"><s>S</s></button>
          </div>

          <div class="summit-toolbar__divider"></div>

          <div class="summit-toolbar__group" data-group="colors">
            <label class="summit-btn mountain-swatch" title="Text colour">
              <span class="mountain-swatch__glyph" id="mountain-forecolor-glyph">A</span>
              <input type="color" id="mountain-forecolor" data-cmd="foreColor" value="#24211d" aria-label="Text colour">
            </label>
            <label class="summit-btn mountain-swatch" title="Highlight colour">
              <span class="mountain-swatch__glyph mountain-swatch__glyph--highlight" id="mountain-hilite-glyph">A</span>
              <input type="color" id="mountain-hilitecolor" data-cmd="hiliteColor" value="#f5e1a4" aria-label="Highlight colour">
            </label>
          </div>

          <div class="summit-toolbar__divider"></div>

          <div class="summit-toolbar__group" data-group="size">
            <button type="button" class="summit-btn summit-btn--glyph" data-action="font-size-decrease" aria-label="Decrease font size" title="Decrease font size">A−</button>
            <input type="number" id="mountain-fontsize-input" class="mountain-fontsize-input" min="8" max="96" step="1" placeholder="—" aria-label="Font size" title="Font size — blank means the selection has more than one size">
            <button type="button" class="summit-btn summit-btn--glyph" data-action="font-size-increase" aria-label="Increase font size" title="Increase font size">A+</button>
            <button type="button" class="summit-btn summit-btn--glyph" data-action="uppercase" aria-label="UPPERCASE selection" title="UPPERCASE">AA</button>
            <button type="button" class="summit-btn summit-btn--glyph" data-action="lowercase" aria-label="lowercase selection" title="lowercase">aa</button>
          </div>

          <div class="summit-toolbar__divider"></div>

          <div class="summit-toolbar__group" data-group="lists">
            <button type="button" class="summit-btn" data-cmd="insertUnorderedList" aria-label="Bullet list" aria-pressed="false" title="Bullet list">
              <svg viewBox="0 0 20 20"><circle cx="3" cy="5" r="1.4"/><circle cx="3" cy="10" r="1.4"/><circle cx="3" cy="15" r="1.4"/><line x1="7.5" y1="5" x2="17" y2="5"/><line x1="7.5" y1="10" x2="17" y2="10"/><line x1="7.5" y1="15" x2="17" y2="15"/></svg>
            </button>
            <button type="button" class="summit-btn" data-cmd="insertOrderedList" aria-label="Numbered list" aria-pressed="false" title="Numbered list">
              <svg viewBox="0 0 20 20"><text x="0.5" y="6.5" font-size="5" stroke="none" fill="currentColor">1</text><text x="0.5" y="11.5" font-size="5" stroke="none" fill="currentColor">2</text><text x="0.5" y="16.5" font-size="5" stroke="none" fill="currentColor">3</text><line x1="7.5" y1="5" x2="17" y2="5"/><line x1="7.5" y1="10" x2="17" y2="10"/><line x1="7.5" y1="15" x2="17" y2="15"/></svg>
            </button>
            <button type="button" class="summit-btn" data-action="outdent" aria-label="Decrease indent" title="Decrease indent">
              <svg viewBox="0 0 20 20"><line x1="2" y1="4" x2="18" y2="4"/><line x1="9" y1="10" x2="18" y2="10"/><line x1="2" y1="16" x2="18" y2="16"/><path d="M7 7 L3 10 L7 13 Z" fill="currentColor" stroke="none"/></svg>
            </button>
            <button type="button" class="summit-btn" data-action="indent" aria-label="Increase indent" title="Increase indent">
              <svg viewBox="0 0 20 20"><line x1="2" y1="4" x2="18" y2="4"/><line x1="9" y1="10" x2="18" y2="10"/><line x1="2" y1="16" x2="18" y2="16"/><path d="M3 7 L7 10 L3 13 Z" fill="currentColor" stroke="none"/></svg>
            </button>
          </div>

          <div class="summit-toolbar__divider"></div>

          <div class="summit-toolbar__group" data-group="links">
            <button type="button" class="summit-btn" data-action="link" aria-label="Insert or edit link" title="Insert/edit link">
              <svg viewBox="0 0 20 20"><path d="M8.5 11.5a3 3 0 0 0 4 .3l2-2a3 3 0 0 0-4.2-4.2l-1.1 1.1" fill="none"/><path d="M11.5 8.5a3 3 0 0 0-4-.3l-2 2a3 3 0 0 0 4.2 4.2l1.1-1.1" fill="none"/></svg>
            </button>
            <button type="button" class="summit-btn" data-action="unlink" aria-label="Remove link" title="Remove link">
              <svg viewBox="0 0 20 20"><path d="M8.5 11.5a3 3 0 0 0 4 .3l1-1" fill="none"/><path d="M11.5 8.5a3 3 0 0 0-4-.3l-1 1" fill="none"/><line x1="3" y1="17" x2="17" y2="3"/></svg>
            </button>
          </div>

          <div class="summit-toolbar__divider"></div>

          <div class="summit-toolbar__group" data-group="clear">
            <button type="button" class="summit-btn" data-action="clear-format" aria-label="Clear formatting" title="Clear formatting">
              <svg viewBox="0 0 20 20"><path d="M4 13 L11 3 L17 8 L10 17 Z" fill="none"/><line x1="7" y1="17" x2="18" y2="17"/><line x1="3" y1="3" x2="17" y2="17"/></svg>
            </button>
          </div>

          <div class="summit-toolbar__spacer"></div>

          <div class="summit-toolbar__group" data-group="page-size">
            <select id="mountain-page-size" class="summit-select" aria-label="Page size">
              <option value="letter">Letter</option>
              <option value="a4">A4</option>
            </select>
          </div>
        </div>

        <div class="mountain-scroll">
          <div class="mountain-pages" id="mountain-pages"></div>
        </div>

        <div class="mountain-link-popover" id="mountain-link-popover" hidden>
          <input type="url" id="mountain-link-input" class="mountain-link-popover__input" placeholder="https://example.com" inputmode="url">
          <div class="mountain-link-popover__actions">
            <button type="button" class="summit-btn" data-action="link-cancel">Cancel</button>
            <button type="button" class="summit-btn summit-btn--primary" data-action="link-save">Save</button>
          </div>
        </div>

      </div>
    </section>

    <section class="summit-panel" id="panel-peaks" role="tabpanel" aria-labelledby="tab-peaks" hidden>
      <div class="peaks" id="peaks">

        <div class="summit-toolbar peaks-toolbar" role="toolbar" aria-label="Peaks formatting toolbar">

          <div class="summit-toolbar__group" data-group="fill">
            <label class="summit-btn peaks-swatch" title="Cell fill colour">
              <span class="peaks-swatch__glyph" id="peaks-fill-glyph" style="background:#E8D9C4"></span>
              <input type="color" id="peaks-fill-color" value="#E8D9C4" aria-label="Cell fill colour">
            </label>
            <button type="button" class="summit-btn" id="peaks-fill-clear" aria-label="Clear fill colour" title="Clear fill colour">
              <svg viewBox="0 0 20 20"><rect x="3" y="3" width="14" height="14" rx="1.5" fill="none"/><line x1="3" y1="17" x2="17" y2="3"/></svg>
            </button>
          </div>

          <div class="summit-toolbar__divider"></div>

          <div class="summit-toolbar__group" data-group="borders">
            <button type="button" class="summit-btn" data-border-edge="all" aria-label="All borders" title="All borders">
              <svg viewBox="0 0 20 20"><rect x="3" y="3" width="14" height="14" fill="none"/><line x1="3" y1="10" x2="17" y2="10"/><line x1="10" y1="3" x2="10" y2="17"/></svg>
            </button>
            <button type="button" class="summit-btn" data-border-edge="outside" aria-label="Outside border" title="Outside border">
              <svg viewBox="0 0 20 20"><rect x="3" y="3" width="14" height="14" fill="none" stroke-width="2"/></svg>
            </button>
            <button type="button" class="summit-btn" data-border-edge="top" aria-label="Top border" title="Top border">
              <svg viewBox="0 0 20 20"><rect x="3" y="3" width="14" height="14" fill="none" stroke-opacity="0.35"/><line x1="3" y1="3" x2="17" y2="3" stroke-width="2.4"/></svg>
            </button>
            <button type="button" class="summit-btn" data-border-edge="bottom" aria-label="Bottom border" title="Bottom border">
              <svg viewBox="0 0 20 20"><rect x="3" y="3" width="14" height="14" fill="none" stroke-opacity="0.35"/><line x1="3" y1="17" x2="17" y2="17" stroke-width="2.4"/></svg>
            </button>
            <button type="button" class="summit-btn" data-border-edge="left" aria-label="Left border" title="Left border">
              <svg viewBox="0 0 20 20"><rect x="3" y="3" width="14" height="14" fill="none" stroke-opacity="0.35"/><line x1="3" y1="3" x2="3" y2="17" stroke-width="2.4"/></svg>
            </button>
            <button type="button" class="summit-btn" data-border-edge="right" aria-label="Right border" title="Right border">
              <svg viewBox="0 0 20 20"><rect x="3" y="3" width="14" height="14" fill="none" stroke-opacity="0.35"/><line x1="17" y1="3" x2="17" y2="17" stroke-width="2.4"/></svg>
            </button>
            <button type="button" class="summit-btn" data-border-edge="none" aria-label="No border" title="No border">
              <svg viewBox="0 0 20 20"><rect x="3" y="3" width="14" height="14" fill="none" stroke-opacity="0.35"/><line x1="3" y1="17" x2="17" y2="3"/></svg>
            </button>
            <select id="peaks-border-style" class="summit-select" aria-label="Border style">
              <option value="thin">Thin</option>
              <option value="thick">Thick</option>
              <option value="dashed">Dashed</option>
            </select>
          </div>

          <div class="summit-toolbar__spacer"></div>

          <div class="summit-toolbar__group" data-group="ref">
            <span class="peaks-cellref" id="peaks-cellref">A1</span>
          </div>
        </div>

        <div class="peaks-scroll" id="peaks-scroll">
          <table class="peaks-grid" id="peaks-grid">
            <colgroup id="peaks-colgroup"></colgroup>
            <thead>
              <tr id="peaks-header-row">
                <th class="peaks-corner" id="peaks-corner" scope="col" aria-label="Select all"></th>
              </tr>
            </thead>
            <tbody id="peaks-body"></tbody>
          </table>
        </div>

      </div>
    </section>

    <section class="summit-panel" id="panel-draft" role="tabpanel" aria-labelledby="tab-draft" hidden>
      <div class="summit-placeholder">
        <p class="summit-placeholder__eyebrow">Sections 5–8</p>
        <p class="summit-placeholder__label">Draft — keyword tagging &amp; template engine not yet built</p>
      </div>
    </section>
  </main>

  <script src="js/app.js"></script>
  <script src="js/mountain.js"></script>
  <script src="js/peaks.js"></script>
</body>
</html>
